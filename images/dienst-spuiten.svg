<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600">
  <defs>
    <radialGradient id="sprayBg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#16161e"/>
      <stop offset="100%" stop-color="#090909"/>
    </radialGradient>
    <radialGradient id="sprayGlow" cx="60%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#b8974a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="spray"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="softGlow"><feGaussianBlur stdDeviation="10"/></filter>
  </defs>
  <rect width="900" height="600" fill="url(#sprayBg)"/>
  <rect width="900" height="600" fill="url(#sprayGlow)"/>
  <!-- car panel being sprayed -->
  <rect x="150" y="150" width="400" height="300" rx="8" fill="#1a1a22" stroke="#252530" stroke-width="2"/>
  <!-- fresh paint effect with shimmer -->
  <rect x="155" y="155" width="390" height="290" rx="6" fill="#0d1018" opacity="0.7"/>
  <rect x="155" y="155" width="200" height="290" rx="0" fill="#1c2535" opacity="0.5"/>
  <!-- paint sheen -->
  <path d="M 155 200 Q 250 180 355 220 L 355 260 Q 250 235 155 250 Z" fill="#b8974a" opacity="0.06"/>
  <!-- spray gun -->
  <g transform="translate(580, 180)">
    <rect x="0" y="40" width="120" height="35" rx="8" fill="#222228" stroke="#333340" stroke-width="2"/>
    <rect x="30" y="0" width="20" height="50" rx="4" fill="#1a1a20" stroke="#2a2a35" stroke-width="1.5"/>
    <rect x="60" y="55" width="50" height="12" rx="3" fill="#1a1a20" stroke="#2a2a30" stroke-width="1"/>
    <rect x="110" y="48" width="30" height="8" rx="4" fill="#b8974a" opacity="0.8"/>
    <!-- spray mist -->
    <g opacity="0.3" filter="url(#spray)">
      <circle cx="-20" cy="50" r="15" fill="#b8974a"/>
      <circle cx="-40" cy="45" r="10" fill="#b8974a"/>
      <circle cx="-55" cy="55" r="8" fill="#b8974a"/>
      <circle cx="-30" cy="65" r="12" fill="#b8974a"/>
      <circle cx="-10" cy="35" r="8" fill="#c8a85a"/>
    </g>
    <g opacity="0.15" filter="url(#softGlow)">
      <ellipse cx="-30" cy="52" rx="40" ry="25" fill="#d4af6a"/>
    </g>
  </g>
  <!-- masked area tape lines -->
  <line x1="150" y1="148" x2="550" y2="148" stroke="#c8c820" stroke-width="3" opacity="0.5"/>
  <line x1="150" y1="452" x2="550" y2="452" stroke="#c8c820" stroke-width="3" opacity="0.5"/>
  <!-- reflection on panel -->
  <path d="M 160 160 L 200 160 L 200 440 L 160 440 Z" fill="white" opacity="0.02"/>
</svg>